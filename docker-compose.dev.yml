services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crrt
      POSTGRES_USER: crrt
      POSTGRES_PASSWORD: crrt
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crrt -d crrt"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_UPDATE_NOTIFIER: "false"
      DATABASE_URL: postgresql://crrt:crrt@postgres:5432/crrt?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-crrt-dev-secret-change-in-production}
      NEXTAUTH_URL: http://localhost:3000
      ADMIN_EMAIL: contact@crrt.tech
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: CRRT <contact@crrt.tech>
      MEDIA_MAX_UPLOAD_BYTES: "10485760"
      CHOKIDAR_USEPOLLING: "1"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - dev-node-modules:/app/node_modules
      - dev-next-cache:/app/.next
    develop:
      watch:
        - action: sync+restart
          path: ./package.json
          target: /app/package.json
        - action: sync+restart
          path: ./package-lock.json
          target: /app/package-lock.json
        - action: sync+restart
          path: ./.env
          target: /app/.env
        - action: sync+restart
          path: ./prisma/schema.prisma
          target: /app/prisma/schema.prisma
        - action: sync+restart
          path: ./prisma/migrations
          target: /app/prisma/migrations
        - action: rebuild
          path: ./Dockerfile
    command: >
      sh -c "LOCK_HASH_FILE=/app/node_modules/.package-lock.hash;
      LOCK_HASH=$$(sha256sum /app/package-lock.json | awk '{print $$1}');
      STORED_HASH=$$(cat $$LOCK_HASH_FILE 2>/dev/null || true);
      if [ ! -d /app/node_modules ] || [ -z \"$$(ls -A /app/node_modules 2>/dev/null)\" ] || [ \"$$LOCK_HASH\" != \"$$STORED_HASH\" ]; then
        echo 'Installing dependencies from lockfile...';
        npm ci --no-audit --no-fund &&
        echo \"$$LOCK_HASH\" > \"$$LOCK_HASH_FILE\";
      fi &&
      npx prisma generate &&
      npx prisma migrate deploy &&
      npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  postgres-dev-data:
    driver: local
  dev-node-modules:
    driver: local
  dev-next-cache:
    driver: local
