services:
  postgres:
    image: postgres:16-alpine
    profiles: ["production"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    profiles: ["production"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    command: ["npm", "exec", "--", "prisma", "migrate", "deploy"]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["production"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3300:3300"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST is required}
      SMTP_PORT: ${SMTP_PORT:?SMTP_PORT is required}
      SMTP_USER: ${SMTP_USER:?SMTP_USER is required}
      SMTP_PASS: ${SMTP_PASS:?SMTP_PASS is required}
      SMTP_FROM: ${SMTP_FROM:?SMTP_FROM is required}
      IMAP_HOST: ${IMAP_HOST:-mail.purelymail.com}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_SECURE: ${IMAP_SECURE:-true}
      IMAP_USER: ${IMAP_USER:?IMAP_USER is required}
      IMAP_PASS: ${IMAP_PASS:?IMAP_PASS is required}
      IMAP_FOLDER_INBOX: ${IMAP_FOLDER_INBOX:-INBOX}
      IMAP_FOLDER_SENT: ${IMAP_FOLDER_SENT:-Sent}
      IMAP_FOLDER_DRAFTS: ${IMAP_FOLDER_DRAFTS:-Drafts}
      IMAP_FOLDER_ARCHIVE: ${IMAP_FOLDER_ARCHIVE:-Archive}
      IMAP_FOLDER_TRASH: ${IMAP_FOLDER_TRASH:-Trash}
      IMAP_SYNC_INTERVAL_SECONDS: ${IMAP_SYNC_INTERVAL_SECONDS:-30}
      IMAP_INITIAL_SYNC_DAYS: ${IMAP_INITIAL_SYNC_DAYS:-90}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      MEDIA_UPLOAD_DIR: /app/public/uploads
    volumes:
      - ${MEDIA_UPLOAD_DIR_HOST:-./data/uploads}:/app/public/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3300/api/health | grep -q '\"ok\":true'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    profiles: ["seed"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    command: ["npx", "tsx", "prisma/seed.ts"]
    restart: "no"

volumes:
  postgres-data:
    driver: local
