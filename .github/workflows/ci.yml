name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Build, Unit/API Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/crrt?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-quality-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  e2e-smoke:
    name: Playwright Smoke E2E
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crrt
          POSTGRES_USER: crrt
          POSTGRES_PASSWORD: crrt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crrt -d crrt"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://crrt:crrt@127.0.0.1:5432/crrt?schema=public
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXTAUTH_SECRET: ci-e2e-secret
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
      E2E_ADMIN_EMAIL: admin@crrt.ma
      E2E_ADMIN_PASSWORD: crrt2026
      E2E_MEMBER_EMAIL: member@crrt.ma
      E2E_MEMBER_PASSWORD: crrt2026
      E2E_EVENT_SLUG: arduino-training-2026
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run db:seed

      - name: Build app
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start app
        run: npm run start -- --hostname 127.0.0.1 --port 3000 &

      - name: Wait for app health
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/api/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become healthy in time"
          exit 1

      - name: Run Playwright smoke tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

